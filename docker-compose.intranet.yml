# 内网/生产：使用 .env 中的外置 MySQL、Redis，不启动 Compose 内置 mysql/redis。
# 用法：docker compose -f docker-compose.yml -f docker-compose.intranet.yml up -d --build
name: shellder-agent

services:
  mysql:
    profiles: ['bundled-infra']

  redis:
    profiles: ['bundled-infra']

  shellder-agent-server:
    depends_on: !reset []

  shellder-job-worker:
    depends_on: !reset []
