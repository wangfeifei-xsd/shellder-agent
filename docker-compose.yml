# 默认只启动应用三端，MySQL / Redis 通过 .env.example 连接（不自带数据库容器）。
# 注意：勿在 environment 里写 ${DATABASE_URL}，否则会被宿主机 .env 覆盖 .env.example。
# 本地内置 mysql/redis：docker-compose.bundled-infra.yml
name: shellder-agent

services:
  shellder-agent-server:
    build:
      context: .
      dockerfile: shellder-agent-server/Dockerfile
    container_name: shellder-agent-server
    restart: unless-stopped
    env_file: .env.example
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health/live']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s

  shellder-job-worker:
    build:
      context: .
      dockerfile: shellder-job-worker/Dockerfile
    container_name: shellder-job-worker
    restart: unless-stopped
    env_file: .env.example
    environment:
      NODE_ENV: production
      PORT: 3002
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  shellder-web-console:
    build:
      context: .
      dockerfile: shellder-web-console/Dockerfile
      args:
        VITE_API_BASE_URL: ''
    container_name: shellder-web-console
    restart: unless-stopped
    env_file: .env.example
    depends_on:
      shellder-agent-server:
        condition: service_healthy
    ports:
      - '3000:80'
