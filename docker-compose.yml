name: shellder-agent

services:
  mysql:
    image: mysql:8.0
    container_name: shellder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agent_platform}
      MYSQL_USER: ${MYSQL_USER:-agent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_agent}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: shellder-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  shellder-agent-server:
    build:
      context: .
      dockerfile: shellder-agent-server/Dockerfile
    container_name: shellder-agent-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-agent}:${MYSQL_PASSWORD:-changeme_agent}@mysql:3306/${MYSQL_DATABASE:-agent_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      # 启动时幂等执行 project-sql/00-all-seed.sql；设为 false 可关闭
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  shellder-job-worker:
    build:
      context: .
      dockerfile: shellder-job-worker/Dockerfile
    container_name: shellder-job-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: mysql://${MYSQL_USER:-agent}:${MYSQL_PASSWORD:-changeme_agent}@mysql:3306/${MYSQL_DATABASE:-agent_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  shellder-web-console:
    build:
      context: .
      dockerfile: shellder-web-console/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: shellder-web-console
    restart: unless-stopped
    depends_on:
      shellder-agent-server:
        condition: service_healthy
    ports:
      - '${WEB_CONSOLE_PORT:-3000}:80'

volumes:
  mysql_data:
  redis_data:
