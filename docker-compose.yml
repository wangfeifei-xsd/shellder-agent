# 默认只启动应用三端，MySQL / Redis 通过 .env.example 中的地址连接（不自带数据库容器）。
# 本地如需 Compose 内置 mysql/redis：见 docker-compose.bundled-infra.yml
name: shellder-agent

services:
  shellder-agent-server:
    build:
      context: .
      dockerfile: shellder-agent-server/Dockerfile
    container_name: shellder-agent-server
    restart: unless-stopped
    env_file: .env.example
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.example}
      REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST in .env.example}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-false}
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health/live']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s

  shellder-job-worker:
    build:
      context: .
      dockerfile: shellder-job-worker/Dockerfile
    container_name: shellder-job-worker
    restart: unless-stopped
    env_file: .env.example
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.example}
      REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST in .env.example}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-}
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  shellder-web-console:
    build:
      context: .
      dockerfile: shellder-web-console/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: shellder-web-console
    restart: unless-stopped
    depends_on:
      shellder-agent-server:
        condition: service_healthy
    ports:
      - '${WEB_CONSOLE_PORT:-3000}:80'
