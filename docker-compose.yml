# 默认只启动应用三端；配置见 config/（application.yml.example + .env.example）
name: shellder-agent

services:
  shellder-agent-server:
    build:
      context: .
      dockerfile: shellder-agent-server/Dockerfile
    container_name: shellder-agent-server
    restart: unless-stopped
    env_file: config/.env.example
    environment:
      NODE_ENV: production
      PORT: 3001
      SHELLDER_PROFILE: prod
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health/live']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  shellder-job-worker:
    build:
      context: .
      dockerfile: shellder-job-worker/Dockerfile
    container_name: shellder-job-worker
    restart: unless-stopped
    env_file: config/.env.example
    environment:
      NODE_ENV: production
      PORT: 3002
      SHELLDER_PROFILE: prod
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  shellder-web-console:
    build:
      context: .
      dockerfile: shellder-web-console/Dockerfile
      args:
        VITE_API_BASE_URL: ''
    container_name: shellder-web-console
    restart: unless-stopped
    env_file: config/.env.example
    depends_on:
      shellder-agent-server:
        condition: service_healthy
    ports:
      - '3000:3000'
