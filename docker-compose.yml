name: shellder-agent

services:
  mysql:
    image: mysql:8.0
    container_name: shellder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agent_platform}
      MYSQL_USER: ${MYSQL_USER:-agent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_agent}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: shellder-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  shellder-agent-server:
    build:
      context: .
      dockerfile: shellder-agent-server/Dockerfile
    container_name: shellder-agent-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-agent}:${MYSQL_PASSWORD:-changeme_agent}@mysql:3306/${MYSQL_DATABASE:-agent_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      PATHY_KNOWLEDGE_SERVER_BASE_URL: ${PATHY_KNOWLEDGE_SERVER_BASE_URL:-http://host.docker.internal:8765}
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  shellder-job-worker:
    build:
      context: .
      dockerfile: shellder-job-worker/Dockerfile
    container_name: shellder-job-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  shellder-web-console:
    build:
      context: .
      dockerfile: shellder-web-console/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    container_name: shellder-web-console
    restart: unless-stopped
    depends_on:
      shellder-agent-server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    ports:
      - '3000:3000'

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.54.1
    container_name: shellder-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.2.0
    container_name: shellder-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '3003:3000'
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    profiles: [monitoring]
    image: grafana/loki:3.2.0
    container_name: shellder-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
