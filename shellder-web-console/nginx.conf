server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /shellder/;
  }

  location /shellder/ {
    alias /usr/share/nginx/html/shellder/;
    try_files $uri $uri/ /shellder/index.html;
  }

  location /api/ {
    proxy_pass http://shellder-agent-server:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location /copilot/ {
    proxy_pass http://shellder-agent-server:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }
}
